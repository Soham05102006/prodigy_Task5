<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEATHER</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body background="https://wallpapers.com/images/hd/beach-view-on-full-screen-desktop-iwg20pvseh3n7oqd.jpg">
   
    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter the city name..." spellcheck="false">
            <button class="sea"><img id="sea" src="https://img.icons8.com/?size=100&id=MSQWrXb2vEle&format=png&color=000000"></button>
           </div>
           <div class="weather">
            <img src="https://img.icons8.com/?size=100&id=15360&format=png&color=000000" class="weather-icon">
            <div class="para2">
            <h1 class="temp"></h1>
            <div class="para3">
            <h2 class="city">city</h2>
            </div>
            </div>
            <div class="details">
                <div class="col1"><img src="https://img.icons8.com/?size=100&id=18585&format=png&color=000000">
               <div class="para"> <p class="humidity">--</p>
                <p>Humidity</p>
            </div>
            </div>
                <div class="col2">
                    <img src="https://img.icons8.com/?size=100&id=XU_Xw_ks6koX&format=png&color=000000">
            <div class="para1">
            <p class="wind">--</p>
            <p>wind-speed</p>
            </div>
           </div>
       
    </div>



    
    <script src="weather.js">
      
    

    </script>
    
</body>
</html>
